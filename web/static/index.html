<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Seer Remote Tracker</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; background: #0b0f14; color: #e6edf3; }
    header { padding: 12px 16px; display: flex; gap: 16px; align-items: center; background: #111827; border-bottom: 1px solid #1f2937; }
    header input { background: #0b1220; border: 1px solid #1f2937; color: #e6edf3; padding: 6px 10px; border-radius: 6px; width: 280px; }
    header button { background: #2563eb; border: 0; color: white; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
    header button:disabled { opacity: 0.5; cursor: not-allowed; }
    .wrap { display: grid; grid-template-columns: 1fr 320px; gap: 12px; padding: 12px; }
    .card { background: #0f172a; border: 1px solid #1f2937; border-radius: 10px; overflow: hidden; }
    .card h3 { margin: 0; padding: 10px 12px; border-bottom: 1px solid #1f2937; font-size: 14px; color: #cbd5e1; }
    #frame { width: 100%; display: block; background: #000; }
    #status { padding: 10px 12px; font-size: 13px; color: #9ca3af; }
    #tracks { padding: 10px 12px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; white-space: pre; }
    .hint { font-size: 12px; color: #9ca3af; padding: 0 12px 12px; }
  </style>
</head>
<body>
  <header>
    <div style="font-weight:600;">Seer Remote Tracker</div>
    <div style="flex:1"></div>
    <input id="token" placeholder="token (optional)" />
    <button id="connect">Connect</button>
  </header>

  <div class="wrap">
    <div class="card">
      <h3>Annotated Stream</h3>
      <img id="frame" alt="stream" />
      <div id="status">Disconnected.</div>
      <div class="hint">Tip: start the capture client on the comp laptop. This page only displays what the server receives + processes.</div>
    </div>

    <div class="card">
      <h3>Tracks</h3>
      <div id="tracks">(none)</div>
    </div>
  </div>

<script>
(() => {
  const btn = document.getElementById('connect');
  const tokenEl = document.getElementById('token');
  const statusEl = document.getElementById('status');
  const imgEl = document.getElementById('frame');
  const tracksEl = document.getElementById('tracks');

  let ws = null;
  let lastTs = null;

  function setStatus(s) { statusEl.textContent = s; }

  function wsUrl() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const token = tokenEl.value.trim();
    const qs = token ? `?token=${encodeURIComponent(token)}` : '';
    return `${proto}://${location.host}/ws/view${qs}`;
  }

  btn.onclick = () => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.close();
      return;
    }

    btn.disabled = true;
    setStatus('Connecting...');

    ws = new WebSocket(wsUrl());

    ws.onopen = () => {
      btn.disabled = false;
      btn.textContent = 'Disconnect';
      setStatus('Connected. Waiting for frames...');
      // Keepalive ping so some proxies don't kill idle sockets.
      setInterval(() => {
        if (ws && ws.readyState === WebSocket.OPEN) ws.send('ping');
      }, 5000);
    };

    ws.onclose = () => {
      btn.disabled = false;
      btn.textContent = 'Connect';
      setStatus('Disconnected.');
      tracksEl.textContent = '(none)';
      ws = null;
    };

    ws.onerror = (e) => {
      btn.disabled = false;
      setStatus('WebSocket error.');
      console.error(e);
    };

    ws.onmessage = (ev) => {
      let msg;
      try { msg = JSON.parse(ev.data); } catch { return; }
      if (msg.type !== 'result') return;

      imgEl.src = `data:image/jpeg;base64,${msg.jpg_b64}`;

      const now = performance.now();
      const dt = lastTs ? (now - lastTs) : null;
      lastTs = now;

      const n = Array.isArray(msg.tracks) ? msg.tracks.length : 0;
      setStatus(`Receiving frames. Tracks: ${n}` + (dt ? ` | ~${(1000/dt).toFixed(1)} fps` : ''));

      const lines = (msg.tracks || []).map(t => {
        return `id=${t.id} conf=${(+t.conf).toFixed(2)} bbox=[${t.x1.toFixed(0)},${t.y1.toFixed(0)},${t.x2.toFixed(0)},${t.y2.toFixed(0)}]`;
      });
      tracksEl.textContent = lines.length ? lines.join('\n') : '(none)';
    };
  };
})();
</script>
</body>
</html>
